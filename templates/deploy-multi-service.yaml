version: "2.0"

services:
  # Frontend web server
  web:
    image: nginx:alpine
    expose:
      - port: 80
        as: 80
        accept:
          - myapp.akash.network
        to:
          - global: true
    depends-on:
      - api

  # Backend API
  api:
    image: node:18-alpine
    command: ["node", "server.js"]
    expose:
      - port: 3000
        to:
          - service: web
    depends-on:
      - redis
      - db
    env:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://user:pass@db:5432/mydb

  # Redis cache
  redis:
    image: redis:7-alpine
    expose:
      - port: 6379
        to:
          - service: api

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    env:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=mydb
    expose:
      - port: 5432
        to:
          - service: api
    params:
      storage:
        - name: db-data
          mount: /var/lib/postgresql/data

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 256Mi
        storage:
          - size: 512Mi

    api:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          - size: 1Gi

    redis:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 128Mi
        storage:
          - size: 256Mi

    db:
      resources:
        cpu:
          units: 1
        memory:
          size: 1Gi
        storage:
          - name: db-data
            size: 10Gi
            attributes:
              persistent: true
              class: beta3

  placement:
    akash:
      pricing:
        web:
          denom: uakt
          amount: 50
        api:
          denom: uakt
          amount: 100
        redis:
          denom: uakt
          amount: 30
        db:
          denom: uakt
          amount: 200

deployment:
  web:
    akash:
      profile: web
      count: 2
  api:
    akash:
      profile: api
      count: 2
  redis:
    akash:
      profile: redis
      count: 1
  db:
    akash:
      profile: db
      count: 1
